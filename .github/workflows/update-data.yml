name: Actualizar datos GNP (Windsor)

on:
  schedule:
    - cron: '0 13 * * 1'      # Lunes 13:00 UTC (~07:00 CDMX)
  workflow_dispatch: {}        # Permite ejecutarlo manual desde la pestaña Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar data.json desde la API de Windsor
        shell: pwsh
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: ./scripts/update-data.ps1

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data.json."
            exit 0
          fi
          git commit -m "chore: actualizar datos GNP [auto]"
          # Push robusto: si el remoto avanzó, se resincroniza y reintenta (nuestro data.json gana)
          for i in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Push OK (intento $i)"; exit 0
            fi
            echo "Remoto avanzó; resincronizando (intento $i)..."
            git fetch origin main
            git reset --soft origin/main
            if git diff --staged --quiet; then
              echo "data.json ya estaba al día en el remoto."; exit 0
            fi
            git commit -m "chore: actualizar datos GNP [auto]"
          done
          echo "No se pudo hacer push tras varios intentos."; exit 1
